<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="api-base" content="https://python-coach-api.vercel.app">
<meta name="description" content="互動式 Python 入門學習教練：Claude AI 對話式教學、Azure 自然語音朗讀、從基礎語法到實戰練習。">
<meta property="og:type" content="website">
<meta property="og:title" content="Python 入門學習教練">
<meta property="og:description" content="互動式 Python 入門學習教練：Claude AI 對話式教學、Azure 自然語音朗讀、從基礎語法到實戰練習。">
<meta property="og:locale" content="zh_TW">
<meta name="twitter:card" content="summary">
<title>Python 入門學習教練</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐍</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;800&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #f78166;
    --accent2: #79c0ff;
    --accent3: #56d364;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --user-bubble: #1f3a5f;
    --coach-bubble: #1a2332;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header .logo {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .sidebar-header .logo span { color: var(--accent2); }

  .sidebar-header .subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .progress-bar-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent3), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .chapter-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .chapter-list::-webkit-scrollbar { width: 4px; }
  .chapter-list::-webkit-scrollbar-track { background: transparent; }
  .chapter-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chapter-item {
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }

  .chapter-item:hover { background: var(--surface2); }
  .chapter-item.active {
    background: var(--surface2);
    border-left-color: var(--accent2);
  }

  .chapter-item.done { border-left-color: var(--accent3); }

  .chapter-item.bonus .ch-num {
    color: var(--accent4);
  }

  .bonus-badge {
    display: inline-block;
    font-size: 9px;
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--accent4);
    border: 1px solid var(--accent4);
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
    opacity: 0.8;
  }

  .bonus-divider {
    padding: 10px 16px 4px;
    font-size: 10px;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    color: var(--accent4);
    letter-spacing: 1px;
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    margin-top: 4px;
    opacity: 0.7;
  }

  .ch-num {
    font-family: 'Sora', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .ch-title {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.3;
  }

  .ch-done-badge {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent3);
    font-size: 14px;
  }

  /* MAIN */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOPBAR */
  .topbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .current-chapter {
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .current-chapter span {
    color: var(--accent2);
    font-size: 12px;
    font-weight: 400;
    margin-left: 8px;
  }

  .topbar-actions {
    display: flex;
    gap: 8px;
  }

  .btn-action {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .btn-action:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .btn-action.primary {
    background: var(--accent2);
    border-color: var(--accent2);
    color: var(--bg);
  }

  .btn-action.primary:hover { opacity: 0.85; }

  /* CHAT AREA */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #chat-area::-webkit-scrollbar { width: 6px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 820px;
    animation: fadeSlide 0.2s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.coach {
    background: linear-gradient(135deg, #1c3f60, #0f2d4a);
    border: 1px solid var(--accent2);
    font-size: 18px;
  }

  .avatar.user {
    background: linear-gradient(135deg, #3d1f1f, #2a0f0f);
    border: 1px solid var(--accent);
    font-size: 15px;
  }

  .bubble {
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
    max-width: 680px;
  }

  .msg.coach .bubble {
    background: var(--coach-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #2a4a6f;
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(255,255,255,0.07);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12.5px;
    color: var(--accent4);
  }

  .bubble pre {
    background: #0a0f16;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin: 10px 0;
    overflow-x: auto;
    position: relative;
  }

  .bubble pre code {
    background: none;
    padding: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #e6edf3;
    line-height: 1.6;
  }

  .bubble .lang-label {
    position: absolute;
    top: 8px;
    left: 14px;
    font-size: 10px;
    font-family: 'Sora', sans-serif;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .copy-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 10px;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: all 0.15s;
    z-index: 1;
  }
  .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .speak-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .speak-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .bubble strong { color: var(--accent2); font-weight: 600; }
  .bubble em { color: var(--accent4); font-style: normal; }

  .bubble h3 {
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent2);
    margin: 12px 0 6px;
  }

  .bubble ul, .bubble ol {
    padding-left: 20px;
    margin: 8px 0;
  }

  .bubble li { margin: 4px 0; }

  .bubble table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 13px;
  }
  .bubble table th {
    background: var(--surface2);
    color: var(--accent2);
    font-weight: 600;
    padding: 7px 12px;
    border: 1px solid var(--border);
    text-align: left;
  }
  .bubble table td {
    padding: 6px 12px;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .bubble table tr:nth-child(even) td {
    background: rgba(255,255,255,0.02);
  }

  .bubble .highlight-box {
    background: rgba(121, 192, 255, 0.06);
    border-left: 3px solid var(--accent2);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    margin: 10px 0;
  }

  .bubble .quiz-box {
    background: rgba(247, 129, 102, 0.06);
    border: 1px solid rgba(247, 129, 102, 0.3);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 10px 0;
  }

  .bubble .quiz-box .quiz-title {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  /* Quick reply chips */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 24px 8px;
  }

  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12.5px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.15s;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .chip:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(121, 192, 255, 0.05);
  }

  /* INPUT AREA */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within { border-color: var(--accent2); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 24px;
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: var(--accent2);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
    margin-bottom: 2px;
  }

  #send-btn:hover { opacity: 0.8; }
  #send-btn:disabled { opacity: 0.3; cursor: default; }

  #send-btn svg { width: 16px; height: 16px; fill: var(--bg); }

  .input-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 7px;
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 0 4px;
  }

  .typing .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: blink 1.2s infinite;
  }

  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Welcome screen */
  .welcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 620px;
    margin: auto;
  }

  .welcome-card .wc-emoji { font-size: 42px; margin-bottom: 12px; }
  .welcome-card h2 {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
  }

  .welcome-card p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .start-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .start-chip {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    background: rgba(121,192,255,0.05);
    transition: all 0.15s;
  }

  .start-chip:hover {
    background: rgba(121,192,255,0.12);
  }

  /* HAMBURGER BUTTON */
  #hamburger {
    display: none;
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 1001;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    color: var(--text);
  }

  /* SIDEBAR OVERLAY */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
  }
  #sidebar-overlay.open { display: block; }

  /* RWD */
  @media (max-width: 768px) {
    #hamburger { display: flex; }

    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 1000;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    #sidebar.open { transform: translateX(0); }

    #main { width: 100%; }

    .topbar {
      padding-left: 56px;
    }

    .current-chapter { font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .topbar-actions { flex-shrink: 0; }
    .topbar-actions .btn-action { padding: 5px 8px; font-size: 11px; }

    #chat-area { padding: 16px; }

    .bubble {
      max-width: calc(100vw - 80px);
      font-size: 13.5px;
    }

    .quick-replies { padding: 0 12px 8px; }

    .input-area { padding: 12px 12px 16px; }

    .welcome-card { padding: 20px 16px; }
  }
</style>
<script defer src="/_vercel/insights/script.js"></script></head>
<body>

<button id="hamburger" onclick="toggleSidebar()" aria-label="開啟選單">☰</button>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar" role="tablist" aria-label="章節選單">
  <div class="sidebar-header">
    <div class="logo">Python <span>Coach</span></div>
    <div class="subtitle">🏕️ 共學營學習教練 · 初學者版</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>學習進度</span>
      <span id="prog-text">0 / 16 章節</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="chapter-list" id="chapter-list"></div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="current-chapter" id="current-title">
      Python 入門共學營
      <span>選擇章節開始學習</span>
    </div>
    <div class="topbar-actions">
      <button class="btn-action" onclick="clearChat()">清除對話</button>
      <button class="btn-action primary" onclick="markDone()">✓ 學完了！</button>
    </div>
  </div>

  <div id="chat-area">
    <div class="welcome-card">
      <div class="wc-emoji">🐍</div>
      <h2>你好！我是你的 Python 學習教練</h2>
      <p>
        我已經熟讀了你上傳的 <strong style="color:var(--accent2)">《Python 程式設計入門共學營》</strong> 完整課程（345 頁），
        可以陪你從零開始學 Python！<br><br>
        你可以從左側選擇章節，或直接告訴我你想學什麼。
        不懂的地方盡管問，我會用最白話的方式解釋 ✨
      </p>
      <div class="start-chips">
        <button class="start-chip" onclick="startLesson(0)">🚀 從頭開始學</button>
        <button class="start-chip" onclick="askQuestion('什麼是變數？用最簡單的方式解釋給我聽')">📦 變數是什麼？</button>
        <button class="start-chip" onclick="startLesson(16)">🌿 Git 版本控制</button>
        <button class="start-chip" onclick="startLesson(17)">📁 檔案讀寫</button>
        <button class="start-chip" onclick="startLesson(18)">🏷️ Type Hints</button>
      </div>
    </div>
  </div>

  <div class="quick-replies" id="quick-replies"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="問我任何問題，或輸入你的程式碼讓我幫你檢查..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="送出" aria-label="送出訊息">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="input-hint">按 Enter 送出 · Shift+Enter 換行</div>
  </div>
</div>

<script>
const CHAPTERS = [
  { id: 0, num: "CH 01", title: "開始之前：學習動機與目標", emoji: "🎯",
    context: "確認學習動機和目標、了解程式設計的基本概念" },
  { id: 1, num: "CH 02", title: "Python 程式設計概論", emoji: "📖",
    context: "程式是什麼、演算法、流程圖、虛擬碼、Python 介紹" },
  { id: 2, num: "CH 03", title: "變數、物件型別與運算式", emoji: "📦",
    context: "Python 世界都是物件、變數命名、int/float/bool/str/None 型別、型別轉換、四則運算" },
  { id: 3, num: "CH 04", title: "使用者輸入輸出與字串操作", emoji: "⌨️",
    context: "input()、print()、字串串接、字串方法 upper/lower/strip/split 等" },

let codeBlockId = 0;

function formatMessage(text) {
  // Code blocks
  text = text.replace(/```python\n?([\s\S]*?)```/g, (_, code) => {
    const id = 'code-' + (codeBlockId++);
    return `<pre><span class="lang-label">PYTHON</span><button class="copy-btn" onclick="copyCode('${id}')">複製</button><code id="${id}">${escapeHtml(code.trim())}</code></pre>`;
  });
  text = text.replace(/```\n?([\s\S]*?)```/g, (_, code) => {
    const id = 'code-' + (codeBlockId++);
    return `<pre><button class="copy-btn" onclick="copyCode('${id}')">複製</button><code id="${id}">${escapeHtml(code.trim())}</code></pre>`;
  });

  // Inline code (with XSS escape)
  text = text.replace(/`([^`]+)`/g, (_, code) => '<code>' + escapeHtml(code) + '</code>');

  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic / accent
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h3>$1</h3>');

  // Lists
  text = text.replace(/^\- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');

  // Tables
  text = text.replace(/^(\|.+\|\n)((?:\|[-: ]+)+\|\n)((?:\|.+\|\n?)+)/gm, (match, header, sep, body) => {
    const parseRow = row => row.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
    const headers = parseRow(header);
    const rows = body.trim().split('\n').map(parseRow);
    const ths = headers.map(h => `<th>${h}</th>`).join('');
    const trs = rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  // Quiz box
  text = text.replace(/🧩(.+?)(?=\n\n|\n[^-\s]|$)/gs, (m, c) =>
    `<div class="quiz-box"><div class="quiz-title">🧩 練習題</div>${c.trim()}</div>`);

  // Highlight box
  text = text.replace(/💡(.+?)(?=\n\n|\n[^\s]|$)/gs, (m, c) =>
    `<div class="highlight-box">💡${c.trim()}</div>`);

  // Line breaks
  text = text.replace(/\n\n/g, '</p><p>');
  text = '<p>' + text + '</p>';
  text = text.replace(/<p><\/p>/g, '');
  text = text.replace(/<p>(<pre|<ul|<h3|<div|<table)/g, '$1');
  text = text.replace(/(<\/pre>|<\/ul>|<\/h3>|<\/div>|<\/table>)<\/p>/g, '$1');

  return text;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.parentElement.querySelector('.copy-btn');
    if (btn) { btn.textContent = '已複製 ✓'; setTimeout(() => btn.textContent = '複製', 1500); }
  });
}

const TTS_API = API_BASE;
const TTS_LS = { rate:'tts.rate', voice:'tts.azVoice' };
function ttsGetRate(){ return parseFloat(localStorage.getItem(TTS_LS.rate) || '1.05'); }
function ttsGetVoice(){ return localStorage.getItem(TTS_LS.voice) || 'zh-TW-HsiaoChenNeural'; }
let __ttsAudio = null;
let __ttsQueue = [];
let __ttsIdx = 0;
let __ttsAzureOK = null;
let __ttsVoices = [];
let __ttsEpoch = 0;

async function probeAzure(){
  if (__ttsAzureOK !== null) return __ttsAzureOK;
  try {
    const r = await fetch(TTS_API + '/api/health', { cache:'no-store' });
    const d = await r.json();
    __ttsAzureOK = !!(d && d.azure);
    if (__ttsAzureOK){
      const vr = await fetch(TTS_API + '/api/voices');
      const list = await vr.json();
      __ttsVoices = (list||[]).filter(v => /^zh-(TW|CN|HK)/.test(v.locale));
      ttsRefreshVoiceList();
    }
  } catch(e){ __ttsAzureOK = false; }
  return __ttsAzureOK;
}

function clearActiveBtns(){

}

function ttsStopAll(){
  __ttsEpoch++;
  if (__ttsAudio){ __ttsAudio.onended = __ttsAudio.onerror = null; __ttsAudio.pause(); __ttsAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  clearActiveBtns();
  ttsSetStatus('idle');
}

function ttsSplit(text){
  return text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '').replace(/\s+/g,' ').split(/(?<=[。！？!?；;])/).map(s=>s.trim()).filter(Boolean);
}

async function ttsNext(){
  if (__ttsIdx >= __ttsQueue.length){ ttsSetStatus('idle'); return; }
  const myEpoch = __ttsEpoch;
  const text = __ttsQueue[__ttsIdx];
  const useAzure = await probeAzure();
  if (__ttsEpoch !== myEpoch) return;
  if (useAzure){
    try {
      const ratePct = Math.round((ttsGetRate() - 1) * 100);
      const r = (ratePct >= 0 ? '+' : '') + ratePct + '%';
      const resp = await fetch(TTS_API + '/api/tts', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text: text.slice(0, 4000), voice: ttsGetVoice(), rate: r })
      });
      if (__ttsEpoch !== myEpoch) return;
      if (!resp.ok) throw new Error('tts '+resp.status);
      const blob = await resp.blob();
      if (__ttsEpoch !== myEpoch) return;
      __ttsAudio = new Audio(URL.createObjectURL(blob));
      __ttsAudio.onended = () => { if (__ttsEpoch === myEpoch){ __ttsIdx++; ttsNext(); } };
      __ttsAudio.onerror = () => { if (__ttsEpoch === myEpoch){ __ttsIdx++; ttsNext(); } };
      ttsSetStatus('playing');
      __ttsAudio.play();
      return;
    } catch(e){
      if (__ttsEpoch !== myEpoch) return;
      console.warn('Azure TTS 失敗，退回瀏覽器 TTS：', e);
    }
  }
  // Fallback：瀏覽器
  if (!window.speechSynthesis){ ttsSetStatus('idle'); return; }
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-TW';
  utt.rate = ttsGetRate();
  const voices = window.speechSynthesis.getVoices();
  const zh = voices.find(v => /zh.TW/i.test(v.lang)) || voices.find(v => /^zh/i.test(v.lang));
  if (zh) utt.voice = zh;
  utt.onend = () => { if (__ttsEpoch === myEpoch){ __ttsIdx++; ttsNext(); } };
  utt.onerror = () => { if (__ttsEpoch === myEpoch){ __ttsIdx++; ttsNext(); } };
  ttsSetStatus('playing');
  window.speechSynthesis.speak(utt);
}

async function speakText(text) {
  const clean = String(text)
    .replace(/```[\s\S]*?```/g,'（程式碼區塊略過）')
    .replace(/`([^`]+)`/g,'$1')
    .replace(/[*#>_~]/g,'')
    .trim();
  if (!clean) return;
  // 切換：再次點同一按鈕 = 停止
  if ((__ttsAudio && !__ttsAudio.paused) || (window.speechSynthesis && window.speechSynthesis.speaking)){
    ttsStopAll(); return;
  }
  ttsStopAll();
  __ttsQueue = ttsSplit(clean);
  __ttsIdx = 0;
  ttsShowPanel();
  ttsNext();
}

// ── 浮動控制面板 ──
function ttsSetStatus(s){
  const btn = document.querySelector('#ttsPanel [data-act="toggle"]');
  if (btn) btn.textContent = (s === 'playing') ? '⏸' : '▶';
}
function ttsShowPanel(){ document.getElementById('ttsPanel')?.classList.add('open'); }
function ttsRefreshVoiceList(){
  const sel = document.querySelector('#ttsPanel [data-act="voice"]');
  if (!sel) return;
  if (__ttsAzureOK && __ttsVoices.length){
    sel.innerHTML = __ttsVoices.map(v =>
      `<option value="${v.name}">${v.display||v.name} · ${v.locale} ${v.gender==='Female'?'♀':'♂'}</option>`
    ).join('');
    sel.value = ttsGetVoice();
  } else {
    sel.innerHTML = '<option>瀏覽器內建</option>';
    sel.disabled = true;
  }
}

function ttsInitPanel(){
  if (document.getElementById('ttsPanel')) return;
  const style = document.createElement('style');
  style.textContent = `
    #ttsFab{position:fixed;width:48px;height:48px;border-radius:50%;
      background:#f78166;color:#fff;border:0;cursor:grab;font-size:22px;
      box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:999;
      transition:transform .15s, box-shadow .15s;
      touch-action:none;user-select:none;-webkit-user-select:none}
    #ttsFab:hover{transform:scale(1.08)}
    #ttsFab.dragging{cursor:grabbing;transform:scale(1.12);box-shadow:0 8px 24px rgba(0,0,0,.4);transition:none}
    #ttsPanel{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);
      background:#161b22;border:1px solid #30363d;border-radius:16px;
      box-shadow:0 8px 28px rgba(0,0,0,.5);padding:10px 14px;display:none;
      align-items:center;gap:8px;z-index:1002;flex-wrap:wrap;max-width:calc(100vw - 40px);
      opacity:0;transition:opacity .2s, transform .2s;color:#c9d1d9;font-family:inherit}
    #ttsPanel.open{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
    #ttsPanel button.tts-ico{background:#21262d;border:1px solid #30363d;border-radius:10px;
      width:38px;height:38px;font-size:16px;cursor:pointer;color:#c9d1d9;
      display:inline-flex;align-items:center;justify-content:center}
    #ttsPanel button.tts-ico:hover{background:#30363d;border-color:#f78166}
    #ttsPanel select{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;
      border-radius:8px;padding:6px 8px;font-family:inherit;font-size:13px;max-width:180px}
    #ttsPanel .lbl{font-size:13px;color:#8b949e;display:flex;align-items:center;gap:6px}
  `;
  document.head.appendChild(style);

  const fab = document.createElement('button');
  fab.id = 'ttsFab';
  fab.title = '語音控制（可拖曳）';
  fab.textContent = '🔊';
  document.body.appendChild(fab);

  // ── 預設位置：左上角下方，避開一般聊天介面的 header / 輸入框 / 右下送出鈕 ──
  const FAB_LS = 'tts.fabPos';
  function clampPos(x, y){
    const pad = 8, w = fab.offsetWidth || 48, h = fab.offsetHeight || 48;
    const maxX = window.innerWidth - w - pad;
    const maxY = window.innerHeight - h - pad;
    return { x: Math.max(pad, Math.min(x, maxX)), y: Math.max(pad, Math.min(y, maxY)) };
  }
  function applyPos(x, y){
    const p = clampPos(x, y);
    fab.style.left = p.x + 'px';
    fab.style.top = p.y + 'px';
    fab.style.right = 'auto';
    fab.style.bottom = 'auto';
  }
  function loadPos(){
    try {
      const s = localStorage.getItem(FAB_LS);
      if (s){ const {x,y} = JSON.parse(s); applyPos(x, y); return; }
    } catch(e){}
    // 預設：右側偏下、送出鈕正上方的空白區
    const w = fab.offsetWidth || 48;
    applyPos(window.innerWidth - w - 24, Math.round(window.innerHeight * 0.82));
  }
  requestAnimationFrame(loadPos);
  window.addEventListener('resize', () => {
    const x = parseInt(fab.style.left,10) || 16;
    const y = parseInt(fab.style.top,10) || 100;
    applyPos(x, y);
  });

  // ── 拖曳邏輯（區分點擊 vs 拖曳）──
  let dragState = null;
  function onDown(e){
    const pt = e.touches ? e.touches[0] : e;
    dragState = {
      startX: pt.clientX, startY: pt.clientY,
      origX: parseInt(fab.style.left,10) || 0,
      origY: parseInt(fab.style.top,10) || 0,
      moved: false
    };
    e.preventDefault();
  }
  function onMove(e){
    if (!dragState) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - dragState.startX;
    const dy = pt.clientY - dragState.startY;
    if (!dragState.moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)){
      dragState.moved = true;
      fab.classList.add('dragging');
    }
    if (dragState.moved){
      applyPos(dragState.origX + dx, dragState.origY + dy);
    }
  }
  function onUp(e){
    if (!dragState) return;
    const wasMoved = dragState.moved;
    fab.classList.remove('dragging');
    if (wasMoved){
      const x = parseInt(fab.style.left,10);
      const y = parseInt(fab.style.top,10);
      localStorage.setItem(FAB_LS, JSON.stringify({x, y}));
    } else {
      // 視為點擊
      document.getElementById('ttsPanel').classList.toggle('open');
    }
    dragState = null;
  }
  fab.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  fab.addEventListener('touchstart', onDown, { passive:false });
  window.addEventListener('touchmove', onMove, { passive:false });
  window.addEventListener('touchend', onUp);

  const panel = document.createElement('div');
  panel.id = 'ttsPanel';
  panel.innerHTML = `
    <button class="tts-ico" data-act="toggle" title="點擊暫停/繼續，雙擊停止">▶</button>
    <label class="lbl">速度<select data-act="rate">
      <option value="0.85">0.85x</option><option value="1">1x</option>
      <option value="1.05">1.05x</option><option value="1.2">1.2x</option>
      <option value="1.4">1.4x</option><option value="1.6">1.6x</option>
    </select></label>
    <select data-act="voice"></select>
    <button class="tts-ico" data-act="close" title="收起">✕</button>
  `;
  document.body.appendChild(panel);

  panel.querySelector('[data-act="rate"]').value = String(ttsGetRate());

  let _toggleTimer = null;
  panel.addEventListener('click', (e) => {
    const el = e.target.closest('[data-act]');
    if (!el || el.tagName === 'SELECT') return;
    const act = el.dataset.act;
    if (act === 'toggle'){
      if (_toggleTimer){ clearTimeout(_toggleTimer); _toggleTimer = null; ttsStopAll(); return; }
      _toggleTimer = setTimeout(() => {
        _toggleTimer = null;
        if (__ttsAudio && !__ttsAudio.paused){ __ttsAudio.pause(); ttsSetStatus('paused'); return; }
        if (__ttsAudio && __ttsAudio.paused && __ttsAudio.src){ __ttsAudio.play(); ttsSetStatus('playing'); return; }
        if (window.speechSynthesis.paused){ window.speechSynthesis.resume(); ttsSetStatus('playing'); return; }
        if (window.speechSynthesis.speaking){ window.speechSynthesis.pause(); ttsSetStatus('paused'); return; }
        if (__ttsQueue.length && __ttsIdx < __ttsQueue.length){ ttsNext(); return; }
        const msgs = document.querySelectorAll('.msg.coach .bubble');
        const last = msgs[msgs.length - 1];
        if (last) speakText(last.innerText || '');
      }, 250);
      return;
    }
    if (act === 'close'){ ttsStopAll(); panel.classList.remove('open'); }
  });

  function restartFromCurrent(){
    const playing = (__ttsAudio && !__ttsAudio.paused) || (window.speechSynthesis && (window.speechSynthesis.speaking || window.speechSynthesis.paused));
    if (!playing || !__ttsQueue.length) return;
    const i = __ttsIdx;
    ttsStopAll();
    __ttsIdx = i;
    ttsNext();
  }
  panel.addEventListener('change', (e) => {
    const act = e.target.dataset.act;
    if (act === 'rate'){
      localStorage.setItem(TTS_LS.rate, e.target.value);
      restartFromCurrent();
    } else if (act === 'voice'){
      localStorage.setItem(TTS_LS.voice, e.target.value);
      restartFromCurrent();
    }
  });

  probeAzure();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ttsInitPanel);
else ttsInitPanel();

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg coach';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="avatar coach">🐍</div>
    <div class="bubble">
      <div class="typing">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function callAPI(userMsg) {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  const messages = [];
  // Add history (last 10 turns for context)
  const recentHistory = history.slice(-20);
  recentHistory.forEach(m => {
    if (m.content !== userMsg || m.role !== 'user') {
      messages.push({ role: m.role, content: m.content });
    }
  });
  // Ensure last message is the current user message
  if (messages.length === 0 || messages[messages.length-1].content !== userMsg) {
    messages.push({ role: 'user', content: userMsg });
  }

  // Add chapter context if selected
  let systemPrompt = SYSTEM_PROMPT;
  if (currentChapter) {
    systemPrompt += `\n\n當前正在學習的章節：${currentChapter.title}（${currentChapter.context}）`;
  }

  const ctrl = new AbortController();
  const timeout = setTimeout(() => ctrl.abort(), 45_000);
  try {
    const resp = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: ctrl.signal,
      body: JSON.stringify({
        max_tokens: 1000,
        system: systemPrompt,
        messages: messages
      })
    });

    if (!resp.ok) {
      removeTyping();
      const errMap = {
        401: '❌ 後端未設定 ANTHROPIC_KEY 或金鑰無效。請在部署平台的環境變數填入正確的 Claude API key。',
        404: `❌ 找不到後端 /chat（HTTP 404）。\n\n可能原因：\n1. 前端部署在靜態主機（Netlify/Vercel/GitHub Pages），沒有 Node 後端\n2. 後端網址沒設定\n\n解決方式：\n• 部署 server.js（Render / Railway / Fly.io）\n• 在 index.html <head> 加入：\n  <meta name="api-base" content="https://你的後端網址">\n\n目前 API_BASE = "${API_BASE||'（同源相對路徑）'}"`,
        429: '⏳ 請求過於頻繁或 API 額度已用完，請稍後再試。',
        502: '🌐 後端無法連到 Anthropic，請檢查伺服器網路或 key 是否有效。',
        529: '🔧 Anthropic 伺服器目前過載，請稍等片刻再重試。',
      };
      const msg = errMap[resp.status] || `❌ 發生錯誤（HTTP ${resp.status}），請稍後再試。`;
      addMessage('coach', msg);
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      return;
    }

    const data = await resp.json();
    removeTyping();

    if (data.error) {
      addMessage('coach', '❌ API 錯誤：' + data.error.message);
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      return;
    }

    const reply = data.content?.[0]?.text || '抱歉，發生了一點問題，請再試一次！';
    addMessage('coach', reply);

    // Suggest follow-up chips based on context
    if (currentChapter) {
      setQuickReplies([
        '📝 再給我一個例子',
        '🧩 給我一道練習題',
        '🤔 我有點混淆，再說清楚',
        '➡️ 繼續教下一個概念'
      ]);
    }
  } catch (e) {
    removeTyping();
    if (e.name === 'AbortError') {
      addMessage('coach', '⏳ 請求逾時（45 秒），伺服器可能忙碌中，請稍後再試。');
    } else if (!navigator.onLine) {
      addMessage('coach', '🌐 網路已斷線，請確認網路連線後再試。');
    } else if (e instanceof TypeError) {
      addMessage('coach', '🌐 無法連線至 API 伺服器，請檢查網路或防火牆設定。');
    } else {
      addMessage('coach', '😅 連線失敗，請重新整理頁面再試一次。');
    }
  } finally {
    clearTimeout(timeout);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = '';
  addMessage('user', text);
  callAPI(text);
  document.getElementById('quick-replies').innerHTML = '';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function clearChat() {
  history = [];
  const area = document.getElementById('chat-area');
  area.innerHTML = `
    <div class="welcome-card">
      <div class="wc-emoji">🐍</div>
      <h2>對話已清除！</h2>
      <p>選擇左側章節繼續學習，或直接問我問題 ✨</p>
      <div class="start-chips">
        <button class="start-chip" onclick="startLesson(0)">🚀 從頭開始</button>
        <button class="start-chip" onclick="askQuestion('幫我出一道 Python 練習題')">🧩 給我題目</button>
      </div>
    </div>`;
  document.getElementById('quick-replies').innerHTML = '';
}

function markDone() {
  if (!currentChapter) {
    addMessage('coach', '請先從左側選擇一個章節，學完後再點「學完了！」哦 😊');
    return;
  }
  done.add(currentChapter.id);
  localStorage.setItem('py_done', JSON.stringify([...done]));
  renderSidebar();

  const nextId = currentChapter.id + 1;
  if (nextId < CHAPTERS.length) {
    const next = CHAPTERS[nextId];
    const tag = next.bonus ? '⭐ 補充技能' : '下一章節';
    addMessage('coach', `🎉 太棒了！「${currentChapter.title}」已學完！\n\n${tag}是 **${next.emoji} ${next.title}**，要繼續嗎？`);
    setQuickReplies([`▶️ 繼續學「${next.title}」`, '😌 先休息一下']);
  } else {
    addMessage('coach', `🎊 恭喜你！課程章節 + 三個補充技能全部完成！\n\n你現在具備了紮實的 Python 基礎、職場必備的 Git、檔案讀寫和 Type Hints，已經有能力開發真實專案了！`);
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// Init
renderSidebar();
</script>
